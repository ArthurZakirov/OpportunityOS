version: 1

# Shared person facts are not duplicated here. Load them from the
# bitwarden-personal-profile schema via this reference.
personalProfileRef: string

legal:
  citizenships:
    - country: string
      primary: boolean
      disclosurePolicy: string
  workAuthorization:
    byCountry:
      countryCode: boolean
  visaSponsorshipNeeded:
    byCountry:
      countryCode: boolean
  countryScope:
    applyOnlyTo:
      - countryCode
    skipByDefault:
      - countryCode

preferences:
  locations:
    preferred: list
    acceptable: list
    skipByDefault: list
  workMode:
    preferred: list
    minimumOfficeDaysPerWeek: number_or_null
    fullyRemotePolicy: string
  relocation:
    default: boolean
    allowedContexts: list
  travel:
    default: boolean
    allowedContexts: list

availability:
  noticePeriod:
    known: boolean
    value: string_or_null
    source: string_or_null
  vacationWorkdaysRemaining:
    value: number_or_null
    asOfDate: string_or_null
  startDatePolicy: string

compensation:
  expectations:
    byContext:
      - context: string
        currency: string
        unit: string
        value: number_or_null
        rangeMin: number_or_null
        rangeMax: number_or_null
        autoFill: boolean
        allowedCountries: list

reusableAnswers:
  items:
    - key: string
      aliases: list
      answer: string
      allowedContexts: list
      autoFill: boolean
      submitAllowed: boolean
      sensitivity: string
